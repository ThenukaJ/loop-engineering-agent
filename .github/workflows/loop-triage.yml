name: Loop Triage (Daily)

on:
  schedule:
    # 09:00 UTC every day
    - cron: '0 9 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write
  actions: read

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check kill switch
        id: killswitch
        run: |
          if grep -q 'loop-pause-all' STATE.md 2>/dev/null; then
            echo "Kill switch active — skipping triage"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Gather repo context
        if: steps.killswitch.outputs.skip == 'false'
        id: context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## CI Failures (last 24h)" > triage-input.md
          gh run list --status failure --limit 10 --json name,conclusion,headBranch,createdAt,url 2>/dev/null >> triage-input.md || echo "none" >> triage-input.md

          echo "" >> triage-input.md
          echo "## Open Issues (last 24h)" >> triage-input.md
          gh issue list --state open --limit 20 --json number,title,labels,createdAt --jq '.[] | "- #\(.number) \(.title) [\(.labels | map(.name) | join(","))]"' 2>/dev/null >> triage-input.md || echo "none" >> triage-input.md

          echo "" >> triage-input.md
          echo "## Recent Commits (last 48h)" >> triage-input.md
          git log --oneline --since="48 hours ago" --max-count=20 >> triage-input.md || echo "none" >> triage-input.md

      - name: Run triage
        if: steps.killswitch.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # --- Loop Triage (L1 report-only) ---
          #
          # This script simulates the loop-triage skill for L1.
          # It reads triage-input.md, classifies items, and updates STATE.md.

          NOW=$(date -u '+%Y-%m-%d %H:%M UTC')

          # Build the triage report
          cat > triage-report.md <<'HEADER'
          # Triage Report

          HEADER
          echo "**Run:** ${NOW}" >> triage-report.md
          echo "**Level:** L1 (report-only)" >> triage-report.md
          echo "" >> triage-report.md

          # Parse CI failures
          CI_FAILURES=$(gh run list --status failure --limit 20 --json name,url 2>/dev/null | python3 -c "
          import json, sys
          try:
              runs = json.load(sys.stdin)
              if not runs:
                  print('None')
              else:
                  for r in runs[:5]:
                      print(f'- FAIL: {r[\"name\"]} — {r[\"url\"]}')
          except:
              print('None')
          ")

          # Parse open issues
          OPEN_ISSUES=$(gh issue list --state open --limit 20 --json number,title --jq '.[:5][] | "- #\(.number) \(.title)"' 2>/dev/null || echo "None")

          # --- Classify ---
          HIGH_PRIORITY=""
          WATCH=""
          NOISE=""

          if [ -n "$CI_FAILURES" ] && [ "$CI_FAILURES" != "None" ]; then
            HIGH_PRIORITY="${HIGH_PRIORITY}
          ### CI Failures
          ${CI_FAILURES}"
          fi

          if [ -n "$OPEN_ISSUES" ] && [ "$OPEN_ISSUES" != "None" ]; then
            WATCH="${WATCH}
          ### Open Issues
          ${OPEN_ISSUES}"
          fi

          cat >> triage-report.md <<BODY
          ## High Priority
          ${HIGH_PRIORITY:-(none this run)}

          ## Watch List
          ${WATCH:-(none this run)}

          ## Noise / Ignored
          - Checked recent commits — nothing actionable

          ## State Updates
          - Last run: ${NOW}
          BODY

          # --- Update STATE.md ---
          cat > STATE.md <<STATE
          # Loop State — $(echo "$REPO" | cut -d'/' -f2)

          Last run: ${NOW}

          ## High Priority (loop is acting or waiting on human)
          $(echo "$HIGH_PRIORITY" | sed '/^$/d' | head -10)

          ## Watch List
          $(echo "$WATCH" | sed '/^$/d' | head -10)

          ## Recent Noise (ignored this run)
          - Checked recent commits — nothing actionable

          ---
          Run log: see loop-run-log.md
          STATE

          # --- Append to run log ---
          echo "| ${NOW} | L1 | $(echo "$HIGH_PRIORITY" | grep -c 'FAIL' || echo 0) high | $(echo "$WATCH" | grep -c '#' || echo 0) watch | pass |" >> loop-run-log.md

          echo "Triage complete. Report written to STATE.md."

          # --- Create issue if high-priority items found ---
          HIGH_COUNT=$(echo "$HIGH_PRIORITY" | grep -c 'FAIL' 2>/dev/null || echo 0)
          if [ "$HIGH_COUNT" -gt 0 ]; then
            echo "Creating high-priority issue..."
            gh issue create \
              --title "🚨 Loop Triage — ${HIGH_COUNT} high-priority item(s) found" \
              --body "$(cat triage-report.md)" \
              --label "loop-triage,high-priority" 2>/dev/null || echo "Could not create issue (label may not exist yet)"
          fi

      - name: Commit updated state
        if: steps.killswitch.outputs.skip == 'false'
        run: |
          git config user.name "loop-triage-bot"
          git config user.email "actions@github.com"
          git add STATE.md loop-run-log.md
          if git diff --cached --quiet; then
            echo "No state changes — nothing to commit"
          else
            git commit -m "loop-triage: daily run $(date -u '+%Y-%m-%d')"
            git push
          fi
